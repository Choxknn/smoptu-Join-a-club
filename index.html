<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนเลือกชมรม</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 ลงทะเบียนเลือกชมรม</h2>
    <form id="registrationForm">
        <div class="form-group"><label>รหัสนักศึกษา</label><input type="text" id="student_id" required placeholder="รหัสนักศึกษา"></div>
        <div class="form-group"><label>ชื่อ - นามสกุล</label><input type="text" id="student_name" required></div>
        <div class="form-group"><label>คณะ</label><input type="text" id="faculty" required></div>
        <div class="form-group"><label>สาขา</label><input type="text" id="major" required></div>
        <div class="form-group"><label>เลือกชมรม</label>
            <select id="club_id" required><option value="">-- กำลังโหลดข้อมูล --</option></select>
        </div>
        <button type="submit" id="submitBtn">ยืนยันการลงทะเบียน</button>
    </form>
    <div id="message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 1. ใส่ Config ของคุณที่นี่
    const firebaseConfig = {
        apiKey: "AIzaSyAABbuxQONpnPapPc1jFCrFq8KczHYPt78",
        authDomain: "smoptu-join-a-club.firebaseapp.com",
        projectId: "smoptu-join-a-club",
        storageBucket: "smoptu-join-a-club.firebasestorage.app",
        messagingSenderId: "1015406099537",
        appId: "1:1015406099537:web:9a46a8cbd4d0a0952e4c70",
        measurementId: "G-3RY6SF3NM7"
    };

    // 2. เริ่มต้นระบบ Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('registrationForm');
    const clubSelect = document.getElementById('club_id');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // 3. ฟังก์ชันดึงรายชื่อชมรม
    async function loadClubs() {
        try {
            const querySnapshot = await getDocs(collection(db, "clubs"));
            clubSelect.innerHTML = '<option value="">-- กรุณาเลือกชมรม --</option>';
            
            if (querySnapshot.empty) {
                clubSelect.innerHTML = '<option value="">ยังไม่มีข้อมูลชมรมในระบบ</option>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const club = doc.data();
                const option = document.createElement('option');
                option.value = doc.id; // ใช้ ID ของเอกสารเป็นรหัสอ้างอิง
                
                if (club.enrolled >= club.quota) {
                    option.text = `[เต็ม] ${club.name} (${club.enrolled}/${club.quota})`;
                    option.disabled = true;
                } else {
                    option.text = `${club.name} (ว่าง ${club.quota - club.enrolled} ที่นั่ง)`;
                }
                clubSelect.appendChild(option);
            });
        } catch (error) {
            console.error("Error loading clubs:", error);
            clubSelect.innerHTML = '<option value="">โหลดข้อมูลล้มเหลว</option>';
        }
    }

    // 4. ฟังก์ชันส่งข้อมูล (พร้อมระบบล็อกคิวตัดโควตา)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true; submitBtn.innerText = 'กำลังประมวลผล...';
        showMessage('', '');

        const student_id = document.getElementById('student_id').value;
        const student_name = document.getElementById('student_name').value;
        const faculty = document.getElementById('faculty').value;
        const major = document.getElementById('major').value;
        const club_id = document.getElementById('club_id').value;

        const clubRef = doc(db, "clubs", club_id);
        const regRef = doc(db, "registrations", student_id); // ใช้รหัสนักศึกษาเป็น ID เพื่อกันลงซ้ำ

        try {
            await runTransaction(db, async (transaction) => {
                // เช็กว่าเด็กคนนี้เคยลงหรือยัง
                const regDoc = await transaction.get(regRef);
                if (regDoc.exists()) {
                    throw "ALREADY_REGISTERED";
                }

                // เช็กโควตาชมรม
                const clubDoc = await transaction.get(clubRef);
                if (!clubDoc.exists()) {
                    throw "CLUB_NOT_FOUND";
                }

                const newEnrolled = clubDoc.data().enrolled + 1;
                if (newEnrolled > clubDoc.data().quota) {
                    throw "FULL";
                }

                // ถ้าผ่านหมด ให้บันทึกข้อมูล
                transaction.update(clubRef, { enrolled: newEnrolled });
                transaction.set(regRef, {
                    student_id: student_id,
                    student_name: student_name,
                    faculty: faculty,
                    major: major,
                    club_name: clubDoc.data().name,
                    timestamp: new Date()
                });
            });

            // สำเร็จ!
            showMessage('🎉 ลงทะเบียนสำเร็จ!', 'success');
            form.reset();
            loadClubs();
            localStorage.setItem('hasRegistered', 'true');
            checkLocalRegistration();

        } catch (error) {
            if (error === "ALREADY_REGISTERED") {
                showMessage('❌ รหัสนักศึกษานี้ลงทะเบียนไปแล้ว', 'error');
            } else if (error === "FULL") {
                showMessage('⚠️ ขออภัย ชมรมนี้เต็มแล้วในขณะที่คุณกด', 'error');
                loadClubs();
            } else {
                showMessage('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                console.error(error);
            }
        }

        submitBtn.disabled = false; submitBtn.innerText = 'ยืนยันการลงทะเบียน';
    });

    function showMessage(text, type) { 
        messageDiv.innerText = text; messageDiv.className = type; messageDiv.style.display = text ? 'block' : 'none'; 
    }

    function checkLocalRegistration() {
        if (localStorage.getItem('hasRegistered') === 'true') {
            form.style.display = 'none'; showMessage('✅ คุณได้ทำการลงทะเบียนจากอุปกรณ์นี้เรียบร้อยแล้ว', 'success');
        }
    }

    checkLocalRegistration();
    loadClubs();
</script>
</body>
</html>
