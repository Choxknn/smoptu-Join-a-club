<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>ระบบจัดการชมรม (Firebase)</h2>
    <a href="timer.html" target="_blank" class="btn btn-primary">เปิดหน้าจับเวลา ⏱️</a>
  </div>

  <div class="card shadow-sm p-4">
    <div class="mb-3">
      <label class="form-label">กรองตามชมรม:</label>
      <select id="clubFilter" class="form-select w-25">
        <option value="">-- แสดงทั้งหมด --</option>
        <option value="ชมรมดนตรี">ชมรมดนตรี</option>
        <option value="ชมรมกีฬา">ชมรมกีฬา</option>
        <option value="ชมรมวิชาการ">ชมรมวิชาการ</option>
      </select>
    </div>

    <table id="studentsTable" class="table table-striped w-100">
      <thead class="table-dark">
        <tr>
          <th>รหัสนักศึกษา</th>
          <th>ชื่อ-สกุล</th>
          <th>ชมรม</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="moveClubModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">ย้ายชมรม</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editDocId">
        <p>นักศึกษา: <span id="editStudentName" class="fw-bold"></span></p>
        <label class="form-label">เลือกชมรมใหม่:</label>
        <select id="newClubSelect" class="form-select">
          <option value="ชมรมดนตรี">ชมรมดนตรี</option>
          <option value="ชมรมกีฬา">ชมรมกีฬา</option>
          <option value="ชมรมวิชาการ">ชมรมวิชาการ</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-success" onclick="saveNewClub()">บันทึกข้อมูล</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
  // 1. นำ Config จาก Firebase Project Settings มาใส่ที่นี่
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let dataTable;

  $(document).ready(function() {
    loadData();
  });

  // 2. ฟังก์ชันดึงข้อมูลจาก Firestore
  function loadData() {
    db.collection("students").get().then((querySnapshot) => {
      let tbody = '';
      querySnapshot.forEach((doc) => {
        let data = doc.data();
        tbody += `<tr>
          <td>${data.studentId}</td>
          <td>${data.name}</td>
          <td>${data.club}</td>
          <td>
            <button class="btn btn-sm btn-warning" 
              onclick="openMoveModal('${doc.id}', '${data.name}', '${data.club}')">
              ย้าย
            </button>
          </td>
        </tr>`;
      });

      // ทำลายตารางเก่าก่อนสร้างใหม่ (กรณีมีการอัปเดตข้อมูล)
      if ($.fn.DataTable.isDataTable('#studentsTable')) {
        $('#studentsTable').DataTable().destroy();
      }

      $('#tableBody').html(tbody);

      // สร้าง DataTables
      dataTable = $('#studentsTable').DataTable({
        dom: '<"row"<"col-sm-12 col-md-6"B><"col-sm-12 col-md-6"f>>rtip',
        buttons: [
          { extend: 'excelHtml5', text: 'ส่งออก Excel', className: 'btn btn-success btn-sm' },
          { extend: 'print', text: 'พิมพ์ / Save PDF', className: 'btn btn-info btn-sm' }
        ],
        language: { search: "ค้นหา:" }
      });

      // กรองตามชมรม
      $('#clubFilter').on('change', function() {
        dataTable.column(2).search(this.value).draw();
      });
    });
  }

  // 3. ฟังก์ชันเปิด Modal
  function openMoveModal(docId, name, currentClub) {
    $('#editDocId').val(docId);
    $('#editStudentName').text(name);
    $('#newClubSelect').val(currentClub);
    let modal = new bootstrap.Modal(document.getElementById('moveClubModal'));
    modal.show();
  }

  // 4. ฟังก์ชันอัปเดตข้อมูลไปยัง Firestore
  function saveNewClub() {
    let docId = $('#editDocId').val();
    let newClub = $('#newClubSelect').val();
    
    db.collection("students").doc(docId).update({
      club: newClub
    }).then(() => {
      $('#moveClubModal').modal('hide');
      alert('อัปเดตข้อมูลสำเร็จ!');
      loadData(); // รีโหลดตาราง
    }).catch((error) => {
      console.error("Error updating document: ", error);
      alert('เกิดข้อผิดพลาดในการอัปเดต');
    });
  }
</script>
</body>
</html>
